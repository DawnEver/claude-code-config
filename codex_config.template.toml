sandbox_mode = "danger-full-access"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

allow_login_shell = true

cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "auto"
windows_wsl_setup_acknowledged = false
check_for_update_on_startup = true
web_search = "cached"
project_doc_fallback_filenames = [
    "CLAUDE.md",
    "AGENT.md",
    "AGENTS.md",
    "README.md",
]

model = "gpt-5.5"
model_reasoning_effort = "low"

service_tier = "default"

[tui]
status_line = [
    "model-with-reasoning",
    "project-name",
    "git-branch",
    "branch-changes",
    "run-state",
    "approval-mode",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
    "task-progress",
]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[analytics]
enabled = false

[feedback]
enabled = false

[windows]
sandbox = "elevated"

[marketplaces.cc-market]
source_type = "git"
source = "https://github.com/DawnEver/cc-market.git"

[plugins."evolve@cc-market"]
enabled = true

[plugins."sharp-review@cc-market"]
enabled = true

[plugins."takeover@cc-market"]
enabled = true

[plugins."rem@cc-market"]
enabled = true

[features]
prevent_idle_sleep = true
terminal_resize_reflow = true
memories = false
external_migration = false
goals = true
js_repl = false
network_proxy = false
