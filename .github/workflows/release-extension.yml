name: Release VS Code Extension

on:
  push:
    tags:
      - 'claude-notifications-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension/claude-notifications

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync package.json version from tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#claude-notifications-v}"
          npm pkg set version="$TAG_VER"
          echo "OK: package.json version set to $TAG_VER"

      - run: npm install

      - run: npm run compile

      - run: npm run package

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/claude-notifications/dist/*.vsix
          body: placeholder

      - name: Update Release Body
        run: |
          VERSION="${GITHUB_REF_NAME#claude-notifications-v}"
          cat > /tmp/release-body.md <<-EOF
          ## Claude Notifications ${VERSION}

          Download the \`.vsix\` attachment below, then in VS Code run **Extensions: Install from VSIX...** to install.
          EOF
          gh release edit "$GITHUB_REF_NAME" --notes-file /tmp/release-body.md
        env:
          GH_TOKEN: ${{ github.token }}
