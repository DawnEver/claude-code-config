name: Release VS Code Extension

on:
  push:
    tags:
      - 'claude-notifications-v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension/claude-notifications

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync package.json version from tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#claude-notifications-v}"
          npm version "$TAG_VER" --no-git-tag-version
          echo "OK: package.json version set to $TAG_VER"

      - run: npm install

      - run: npm run compile

      - run: npm run package

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/claude-notifications/dist/*.vsix
          generate_release_notes: true
